<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Training — Jan</title>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#20261F">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#14181A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ————————————————————————————————————————————
   Design-System v8 — Roadbook
   Shape-Lock: Karten 12px · interaktive Flächen 8px · Tags = Pill (dokumentierte Regel)
   Ein Akzent: Streckenmarkierungs-Orange. Zonenfarben sind Datenfarben, kein Dekor.
   ———————————————————————————————————————————— */
:root{
  --bg:#E9E7DF; --panel:#FCFBF7; --panel2:#F2F0E8;
  --ink:#20261F; --ink-soft:#5B655C; --line:#D6D3C7;
  --accent:#D14B1F; --accent-ink:#FFFFFF;
  --z2:#3E6F8E; --lang:#2E5746; --kraft:#8A7141; --intens:#C2401C;
  --ruhe:#A8ADA6; --dienst:#7A3E8F;
  --done:#2E5746;
  --bonus:#1F8A8A;
  --cond:'Barlow Condensed',-apple-system,system-ui,sans-serif;
  --body:'Barlow',-apple-system,system-ui,sans-serif;
  --r-card:12px; --r-int:8px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#14181A; --panel:#1D2321; --panel2:#232A27;
    --ink:#E9E7DD; --ink-soft:#9AA39A; --line:#323A35;
    --accent:#E8642F; --accent-ink:#16100C;
    --z2:#6FA3C4; --lang:#5E9C82; --kraft:#C0A36E; --intens:#E8642F;
    --ruhe:#5C645D; --dienst:#B07CC4;
    --done:#5E9C82;
    --bonus:#4FC4C4;
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{color-scheme:light dark}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.45}
button{font-family:inherit;cursor:pointer;color:inherit}
button:active{transform:scale(.98)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
.num{font-variant-numeric:tabular-nums}

/* ——— Kopf ——— */
header{background:linear-gradient(180deg,#242B23,#20261F);color:#EFEDE3;padding:calc(env(safe-area-inset-top) + 20px) 18px 18px}
@media (prefers-color-scheme: dark){header{background:linear-gradient(180deg,#1A201D,#14181A);border-bottom:1px solid var(--line)}}
.wrap{max-width:920px;margin:0 auto;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
.eyebrow{font-family:var(--cond);font-weight:600;letter-spacing:.2em;font-size:11px;color:var(--accent);text-transform:uppercase}
h1{font-family:var(--cond);font-weight:700;font-size:clamp(34px,9vw,46px);margin:2px 0 0;line-height:.95;text-transform:uppercase;letter-spacing:.01em}
.head-top{display:flex;justify-content:space-between;align-items:flex-end;gap:14px}
.pct{font-family:var(--cond);font-weight:700;font-size:clamp(30px,8vw,40px);line-height:.9;text-align:right}
.pct small{font-size:.5em;font-weight:600}
.pct-sub{font-size:11px;color:#A9B0A4;margin-top:3px;white-space:nowrap}
.bar{margin-top:14px;height:5px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden}
.bar>div{height:100%;background:var(--accent)}
.stats{display:flex;gap:8px 16px;margin-top:12px;flex-wrap:wrap;font-size:12px;color:#B9BFB2}
.stats strong{color:#EFEDE3;font-weight:600}

/* Wochenvolumen */
.vol{display:flex;gap:5px;align-items:flex-end;margin-top:16px;height:62px}
.vol .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
.vol .stack{width:100%;height:42px;display:flex;align-items:flex-end}
.vol .b{width:100%;border-radius:4px 4px 0 0;position:relative;overflow:hidden;background:rgba(255,255,255,.14)}
.vol .b.vol-big{background:var(--accent)}
.vol .fill{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.5)}
.vol .lbl{font-family:var(--cond);font-weight:600;font-size:10px;color:#A9B0A4;white-space:nowrap}

/* ——— Inhalt ——— */
main{max-width:920px;margin:0 auto;padding:14px 14px calc(env(safe-area-inset-bottom) + 44px)}
.legend{display:flex;gap:6px 12px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--ink-soft);padding:2px 2px 12px}
.legend .sw{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:-1px}
.legend button{margin-left:auto;font-size:12px;font-weight:600;background:var(--panel);border:1px solid var(--line);border-radius:var(--r-int);padding:8px 12px;min-height:36px}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-card);margin-bottom:10px;overflow:hidden}
.card.current{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.card.dashed{border-style:dashed;background:transparent}

/* Wochenkopf + Tagesband (Signature) */
.whead{width:100%;display:block;padding:12px 14px 11px;background:transparent;border:none;text-align:left}
.wrow{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.wid{font-family:var(--cond);font-weight:700;font-size:20px;color:var(--accent)}
.wrange{font-family:var(--cond);font-weight:600;font-size:17px;letter-spacing:.02em}
.pill{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:3px 9px;border-radius:999px;background:var(--panel2);color:var(--ink-soft)}
.pill.volumen{background:var(--accent);color:var(--accent-ink)}
.badge-now{font-family:var(--cond);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent)}
.wmeta{font-size:12px;color:var(--ink-soft);margin-left:auto;white-space:nowrap}
.dayband{display:flex;gap:3px;margin-top:9px;height:7px}
.dayband span{flex:1;border-radius:2px;background:var(--seg);opacity:.32}
.dayband span.don{opacity:1}
.dayband span.rst{opacity:.15}
.wnote{font-size:11.5px;color:var(--ink-soft);margin-top:7px}

/* Tage */
.days{border-top:1px solid var(--line)}
.day{display:flex;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid var(--line);min-height:48px}
.day:first-child{border-top:none}
.day.rest{opacity:.6}
.stripe{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0}
.dd{font-family:var(--cond);font-weight:600;font-size:15px;min-width:50px;flex-shrink:0}
.dtxt{flex:1;min-width:0}
.dtitle{font-weight:600;font-size:13.5px}
.dtitle.done{font-weight:400;text-decoration:line-through;color:var(--ink-soft)}
.dsub.ist{color:var(--done);font-weight:600}
  .dsub{font-size:11.5px;color:var(--ink-soft);display:block;margin-top:1px}
.shift{font-family:var(--cond);font-size:11px;font-weight:600;letter-spacing:.04em;color:#fff;background:var(--dienst);padding:3px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0}
@media (prefers-color-scheme: dark){.shift{color:#16100C}}
.chk{width:30px;height:30px;border-radius:var(--r-int);border:2px solid var(--line);background:transparent;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;color:transparent}
.chk.on{border-color:var(--done);background:var(--done);color:#fff}
@media (prefers-color-scheme: dark){.chk.on{color:#14181A}}

/* Detail + Notizen */
.detail{padding:10px 14px 13px 78px;font-size:12.5px;line-height:1.55;color:var(--ink-soft);background:var(--panel2);border-top:1px dashed var(--line)}
.notewrap{margin-top:11px;padding-top:10px;border-top:1px dashed var(--line)}
.rpelbl{font-family:var(--cond);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:6px}
.rperow{display:flex;gap:4px;flex-wrap:wrap}
.rpe{width:32px;height:32px;border-radius:var(--r-int);border:1px solid var(--line);background:var(--panel);font-size:12.5px;font-weight:600;padding:0}
.rpe.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.noterow{display:flex;gap:6px;margin-top:9px}
.noterow input{flex:1;min-width:0;font-family:var(--body);font-size:13px;padding:9px 11px;border:1px solid var(--line);border-radius:var(--r-int);background:var(--panel);color:var(--ink)}
.noterow input::placeholder{color:var(--ink-soft)}
.noterow button{font-size:12px;font-weight:600;padding:9px 14px;border:none;border-radius:var(--r-int);background:var(--accent);color:var(--accent-ink)}

/* Sektionen unten */
.sechead{width:100%;display:flex;align-items:center;gap:10px;padding:13px 14px;background:transparent;border:none;text-align:left;min-height:46px}
.sechead .t{font-family:var(--cond);font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft)}
.sechead .s{font-size:11px;color:var(--ink-soft);flex:1}
.row{display:flex;gap:10px;padding:10px 14px;border-top:1px solid var(--line);font-size:12.5px;line-height:1.5}
.row .k{font-family:var(--cond);font-weight:600;font-size:12.5px;min-width:74px;flex-shrink:0;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
.row .k.dienste{color:var(--dienst)}.row .k.training{color:var(--z2)}.row .k.material{color:var(--accent)}
.zones{display:grid;grid-template-columns:1fr auto auto;gap:5px 16px;font-size:12.5px;padding:11px 14px;border-top:1px solid var(--line)}
.zones .h{font-family:var(--cond);font-weight:600;color:var(--ink-soft);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.chev{font-size:10px;color:var(--ink-soft);width:12px;text-align:center;flex-shrink:0}
.glabel{font-family:var(--cond);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink);margin-bottom:6px}
  .glegend{display:flex;gap:6px 14px;flex-wrap:wrap;font-size:11px;color:var(--ink-soft);margin-bottom:8px}
  .gdot{display:inline-block;width:9px;height:9px;border-radius:99px;margin-right:5px;vertical-align:-1px}
  .gnote{margin-left:auto;font-style:italic}
  .gcap{font-size:11px;color:var(--ink-soft);line-height:1.5;margin-top:7px}
  .wk-review{padding:11px 14px;background:var(--panel2);border-top:2px solid var(--accent)}
  .wk-review-head{font-family:var(--cond);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:7px}
  .wk-review-kpis{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .wk-review-kpis span{font-size:11px;color:var(--ink-soft);background:var(--panel);padding:3px 8px;border-radius:999px;white-space:nowrap}
  .wk-review-txt{font-size:12px;line-height:1.5;color:var(--ink);margin-top:4px}
  .wk-review-txt strong{color:var(--ink-soft);font-weight:600}
  .review{padding:11px 14px;border-top:1px solid var(--line)}
  .rev-head{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:7px}
  .rev-wk{font-family:var(--cond);font-weight:700;font-size:17px;color:var(--accent)}
  .rev-kpi{font-size:11px;color:var(--ink-soft);background:var(--panel2);padding:3px 8px;border-radius:999px;white-space:nowrap}
  .rev-txt{font-size:12.5px;line-height:1.55;color:var(--ink);margin-top:4px}
  .rev-txt strong{color:var(--ink-soft);font-weight:600}
  .foot{font-size:11.5px;color:var(--ink-soft);line-height:1.6;margin-top:16px}
.reset{margin-top:18px;font-size:12px;color:var(--ink-soft);background:transparent;border:1px solid var(--line);border-radius:var(--r-int);padding:9px 14px;min-height:38px}

@media(min-width:640px){
  .whead{padding:13px 16px}
  .day{padding:11px 16px}
}
@media(prefers-reduced-motion:no-preference){
  .bar>div{transition:width .45s cubic-bezier(.16,1,.3,1)}
  .chk,.rpe,button{transition:transform .12s ease,background .15s ease,border-color .15s ease}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

  {d:"Mi 15.",type:"kraft",title:"Kraft 1",sub:"abends",h:1,detail:Dkraft1},

// ————— Graph-Helfer (reine SVG, responsiv via viewBox) —————
function lineGraph(series, opts){
 // series: [{pts:[{x,y}], color, label}], opts:{w,h,ymin,ymax,xlabels,yunit,ylabels}
 const W=opts.w||320,H=opts.h||150,pl=34,pr=10,pt=12,pb=24;
 const iw=W-pl-pr, ih=H-pt-pb;
 const ymin=opts.ymin,ymax=opts.ymax,n=opts.xlabels.length;
 const xAt=i=>pl+(n<=1?iw/2:iw*i/(n-1));
 const yAt=v=>pt+ih-(ih*(v-ymin)/(ymax-ymin||1));
 let g=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img">`;
 // horizontale Gitterlinien + y-Beschriftung
 (opts.ylabels||[ymin,(ymin+ymax)/2,ymax]).forEach(v=>{
  const y=yAt(v);
  g+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="var(--line)" stroke-width="1"/>`;
  g+=`<text x="${pl-5}" y="${y+3}" text-anchor="end" font-size="9" fill="var(--ink-soft)">${Math.round(v)}</text>`;
 });
 // x-Beschriftung
 opts.xlabels.forEach((lb,i)=>{g+=`<text x="${xAt(i)}" y="${H-7}" text-anchor="middle" font-size="9" fill="var(--ink-soft)">${lb}</text>`});
 // Serien
 series.forEach(s=>{
  if(!s.pts.length)return;
  const d=s.pts.map((p,i)=>`${i?"L":"M"}${xAt(p.x).toFixed(1)},${yAt(p.y).toFixed(1)}`).join(" ");
  g+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  s.pts.forEach(p=>{g+=`<circle cx="${xAt(p.x).toFixed(1)}" cy="${yAt(p.y).toFixed(1)}" r="3.5" fill="${s.color}"/>`});
 });
 g+=`</svg>`;
 return g;
}
function barGraph(bars, opts){
 // bars:[{label,val,done,big}], opts:{w,h,ymax,yunit}
 const W=opts.w||320,H=opts.h||150,pl=30,pr=8,pt=10,pb=22;
 const iw=W-pl-pr, ih=H-pt-pb, n=bars.length, gap=5;
 const bw=(iw-gap*(n-1))/n, ymax=opts.ymax;
 const yAt=v=>pt+ih-(ih*v/(ymax||1));
 let g=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img">`;
 [0,ymax/2,ymax].forEach(v=>{const y=yAt(v);g+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="var(--line)" stroke-width="1"/><text x="${pl-5}" y="${y+3}" text-anchor="end" font-size="9" fill="var(--ink-soft)">${Math.round(v)}</text>`});
 bars.forEach((b,i)=>{
  const x=pl+i*(bw+gap), y=yAt(b.val), bh=pt+ih-y;
  g+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,bh).toFixed(1)}" rx="2" fill="${b.big?"var(--accent)":"var(--z2)"}" opacity="${b.done?1:0.4}"/>`;
  g+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-7}" text-anchor="middle" font-size="9" fill="var(--ink-soft)">${b.label}</text>`;
 });
 g+=`</svg>`;
 return g;
}

 if(showZones){
  html+=`<div class="card"><div class="zones num"><span class="h">Zone</span><span class="h">Watt</span><span class="h">Puls</span>`;
  ZONES.forEach(z=>{html+=`<span>${z[0]}</span><span>${z[1]}</span><span>${z[2]}</span>`});
  html+=`</div></div>`;
 }
 // ——— Fortschritt / Graphen ———
 {
  const ftpPts20=FTP_LOG.map((f,i)=>({x:i,y:f.p20}));
  const ftpPts60=FTP_LOG.map((f,i)=>({x:i,y:f.p60}));
  const allFtp=FTP_LOG.flatMap(f=>[f.p20,f.p60]);
  const fmin=Math.min(...allFtp,140)-10, fmax=Math.max(...allFtp,210)+10;
  const xlabels=FTP_LOG.map(f=>f.date);
  // Rad-Stunden: Ist (RIDE_LOG) vs Plan-Soll pro Woche
  const planH=WEEKS.map(w=>weekStats(w).rh);
  const maxBar=Math.max(...planH,1)*1.1;
  const bars=WEEKS.map((w,i)=>{
   const wv=weekStats(w);
   const hasIst=wv.rhIst>0 && wv.rd>0;
   return {label:w.id,val: hasIst?wv.rhIst:planH[i], done: hasIst, big:w.tag==="Volumen"};
  });
  html+=`<div class="card"><button class="sechead" data-a="stats" aria-expanded="${showStats}"><span class="t">Fortschritt &amp; Kurven</span><span class="s">FTP-Entwicklung · Wochenumfang</span><span class="chev">${showStats?"▲":"▼"}</span></button>`;
  if(showStats){
   html+=`<div style="padding:6px 14px 16px">
    <div class="glabel">FTP-Schätzung aus Strava (W)</div>
    <div class="glegend"><span><span class="gdot" style="background:var(--intens)"></span>20-min-Power</span><span><span class="gdot" style="background:var(--z2)"></span>1-h-Power (Traka-relevant)</span><span class="gnote">Ziel-Linie 226 W hinterlegt</span></div>
    ${lineGraph([
      {pts:ftpPts20,color:"var(--intens)"},
      {pts:ftpPts60,color:"var(--z2)"}
    ],{w:340,h:160,ymin:fmin,ymax:fmax,xlabels,ylabels:[...new Set([fmin,(fmin+fmax)/2,fmax,226])].filter(v=>v>=fmin&&v<=fmax)})}
    <div class="gcap">Steigende 1-h-Power = die aerobe Baustelle schließt sich. Genau das soll bis Traka passieren.</div>

    <div class="glabel" style="margin-top:18px">Rad-Wochenumfang (h)</div>
    <div class="glegend"><span><span class="gdot" style="background:var(--z2)"></span>geplant</span><span><span class="gdot" style="background:var(--z2);opacity:1"></span>voll = Ist aus Strava</span><span><span class="gdot" style="background:var(--accent)"></span>Volumenwoche</span></div>
    ${barGraph(bars,{w:340,h:150,ymax:maxBar})}
    <div class="gcap">Kraft wird separat geführt (Zähler je Woche oben) und fließt nicht in die Rad-Stunden ein.</div>
   </div>`;
  }
  html+=`</div>`;
 }
 WEEKS.forEach(w=>{
  const ws_=weekStats(w);
  const open=!!openWeeks[w.id];
  const [ws,we]=WEEK_DATES[w.id];
  const cur=today>=ws&&today<=we;
  // Tagesband: 7 Segmente, Farbe = Typ, voll = erledigt, blass = offen, fast unsichtbar = Ruhe
  let band="";
  w.days.forEach((d,i)=>{
   const cls=d.type==="ruhe"?"rst":(isDone(w.id+"-"+i)?"don":"");
   band+=`<span class="${cls}" style="--seg:${TYPE[d.type].c}"></span>`;
  });
  html+=`<div class="card${cur?" current":""}"><button class="whead" data-a="week" data-w="${w.id}" aria-expanded="${open}">
   <span class="wrow"><span class="wid">${w.id}</span><span class="wrange">${w.range}</span>
   <span class="pill${w.tag==="Volumen"?" volumen":""}">${w.tag}</span>
   ${cur?'<span class="badge-now">● Aktuell</span>':""}
   <span class="wmeta num">🚴 ${ws_.rd}/${ws_.rt} · ~${fmtH(ws_.rh)} h${ws_.kt?` · 🏋 ${ws_.kd}/${ws_.kt}`:""}${BONUS.filter(b=>b.wk===w.id).length?` · <span style="color:var(--bonus)">+${BONUS.filter(b=>b.wk===w.id).length}</span>`:""} <span class="chev">${open?"▲":"▼"}</span></span></span>
   <span class="dayband">${band}</span>
   ${open?`<span class="wnote">${esc(w.note)}</span>`:""}</button>`;
  if(open){
   html+=`<div class="days">`;
   w.days.forEach((d,i)=>{
    const key=w.id+"-"+i, rest=d.type==="ruhe", chk=isDone(key), dOpen=openDay===key;
    html+=`<div class="day${rest?" rest":""}" data-a="${d.detail?"day":""}" data-k="${key}">
     <span class="stripe" style="background:${TYPE[d.type].c}"></span>
     <span class="dd">${d.d}</span>
     <span class="dtxt"><span class="dtitle${chk?" done":""}">${esc(d.title)}</span>${d.sub?`<span class="dsub">${esc(d.sub)}${d.detail?" "+(dOpen?"▲":"▼"):""}</span>`:(d.detail?`<span class="dsub">${dOpen?"▲":"▼"}</span>`:"")}${ACTUAL[key]?`<span class="dsub ist">▸ ${ACTUAL[key].min} min${ACTUAL[key].hr?` · ⌀${ACTUAL[key].hr} bpm`:""}${ACTUAL[key].w?` · ${ACTUAL[key].w} W`:""}${ACTUAL[key].km?` · ${ACTUAL[key].km} km`:""}${ACTUAL[key].hm?` · ${ACTUAL[key].hm} hm`:""}</span>`:""}${notes[key]?`<span class="dsub" style="color:${TYPE.kraft.c}">✎ RPE ${notes[key].rpe||"–"}${notes[key].n?" · "+esc(notes[key].n):""}</span>`:""}${BONUS.filter(b=>b.dayKey===key).map(b=>`<span class="dsub" style="color:var(--bonus);font-weight:600">+ ${esc(b.note)} · ${b.min} min${b.km?` · ${b.km} km`:""} (Bonus, ${b.sport})</span>`).join("")}</span>
     ${d.shift?`<span class="shift">${d.shift}</span>`:""}
     ${rest?"":`<button class="chk${chk?" on":""}" data-a="chk" data-k="${key}" aria-label="${esc(d.d)} abhaken">✓</button>`}</div>`;
    if(dOpen&&d.detail){
     const nv=notes[key]||{};
     let rpeBtns="";
     for(let r=1;r<=10;r++){rpeBtns+=`<button class="rpe num${nv.rpe===r?" on":""}" data-a="rpe" data-k="${key}" data-r="${r}">${r}</button>`}
     html+=`<div class="detail">${esc(d.detail)}
      <div class="notewrap">
       <div class="rpelbl">Anstrengung (RPE)</div>
       <div class="rperow">${rpeBtns}</div>
       <div class="noterow"><input type="text" id="note-${key}" placeholder="Stichwort, z. B. Beine schwer nach Spätdienst" value="${esc(nv.n||"").replace(/"/g,"&quot;")}" maxlength="120"><button data-a="savenote" data-k="${key}">Speichern</button></div>
      </div></div>`;
    }
   });
   // Kompakte Wochenanalyse am Ende der Woche (falls vorhanden)
   const rev=REVIEWS.find(r=>r.wk===w.id);
   if(rev){
    html+=`<div class="wk-review">
     <div class="wk-review-head">Wochenanalyse ${rev.wk}</div>
     <div class="wk-review-kpis"><span>🚴 ${esc(rev.radH)}</span><span>${rev.lang?"✓":"✗"} lange Ausfahrt</span><span>🏋 ${esc(rev.kraft)}</span>${rev.bonus?`<span style="color:var(--bonus)">+ ${esc(rev.bonus)}</span>`:""}<span>Z2: ${esc(rev.z2)}</span></div>
     <div class="wk-review-txt"><strong>Fazit:</strong> ${esc(rev.fazit)}</div>
     <div class="wk-review-txt"><strong>→ Folgewoche:</strong> ${esc(rev.ableitung)}</div>
    </div>`;
   }
   html+=`</div>`;
  }
  html+=`</div>`;
 });
 html+=`<div class="card dashed"><button class="sechead" data-a="log" aria-expanded="${showLog}"><span class="t">Updates &amp; Änderungen</span><span class="s num">${CHANGELOG.length} Einträge · zuletzt ${CHANGELOG[0].date}</span><span class="chev">${showLog?"▲":"▼"}</span></button>`;
 if(showLog){CHANGELOG.forEach(c=>{html+=`<div class="row"><span class="k num">${c.date}</span><span>${esc(c.text)}</span></div>`})}
 html+=`</div>`;
 // Wochenanalyse
 html+=`<div class="card dashed"><button class="sechead" data-a="review" aria-expanded="${showReview}"><span class="t">Wochenanalyse</span><span class="s">Soll-Ist je Woche · ${REVIEWS.length} ${REVIEWS.length===1?"Eintrag":"Einträge"}</span><span class="chev">${showReview?"▲":"▼"}</span></button>`;
 if(showReview){
  [...REVIEWS].reverse().forEach(r=>{
   html+=`<div class="review">
    <div class="rev-head"><span class="rev-wk">${r.wk}</span>
     <span class="rev-kpi">🚴 ${r.radH}</span>
     <span class="rev-kpi">${r.lang?"✓":"✗"} lange Ausfahrt</span>
     <span class="rev-kpi">🏋 ${r.kraft}</span>
     ${r.bonus?`<span class="rev-kpi" style="color:var(--bonus)">+ ${esc(r.bonus)}</span>`:""}
     <span class="rev-kpi">Z2: ${esc(r.z2)}</span></div>
    <div class="rev-txt"><strong>Fazit:</strong> ${esc(r.fazit)}</div>
    <div class="rev-txt"><strong>→ Folgewoche:</strong> ${esc(r.ableitung)}</div>
   </div>`;
  });
 }
 html+=`</div>`;
 html+=`<div class="card dashed"><button class="sechead" data-a="rules" aria-expanded="${showRules}"><span class="t">Regeln</span><span class="s">Dienstplan, Training, Material &amp; Bedienung</span><span class="chev">${showRules?"▲":"▼"}</span></button>`;
 if(showRules){RULES.forEach(r=>{html+=`<div class="row"><span class="k ${r.cat.toLowerCase()}">${r.cat}</span><span>${esc(r.text)}</span></div>`})}
 html+=`</div>`;
 html+=`<p class="foot">ⓘ Diese App läuft lokal und offline. Plan-Updates: neue index.html von Claude generieren lassen und im Hosting ersetzen — Häkchen und Notizen bleiben erhalten. Hell/Dunkel folgt der Systemeinstellung.</p>
 <button class="reset" data-a="reset">Fortschritt zurücksetzen</button></main>`;
 document.getElementById("app").innerHTML=html;
}

document.getElementById("app").addEventListener("click",e=>{
 if(e.target.tagName==="INPUT")return;
 const el=e.target.closest("[data-a]"); if(!el)return;
 const a=el.dataset.a;
 if(a==="rpe"){const k=el.dataset.k,r=parseInt(el.dataset.r);notes[k]=notes[k]||{};notes[k].rpe=notes[k].rpe===r?undefined:r;nstore.set(notes)}
 else if(a==="savenote"){const k=el.dataset.k;const inp=document.getElementById("note-"+k);notes[k]=notes[k]||{};notes[k].n=(inp&&inp.value.trim())||undefined;if(!notes[k].n&&!notes[k].rpe)delete notes[k];nstore.set(notes)}
 else if(a==="chk"){e.stopPropagation();const k=el.dataset.k;done[k]=!done[k];store.set(done)}
 else if(a==="week"){const w=el.dataset.w;openWeeks[w]=!openWeeks[w]}
 else if(a==="day"){if(e.target.closest(".notewrap"))return;const k=el.dataset.k;openDay=openDay===k?null:k}
 else if(a==="zones")showZones=!showZones;
 else if(a==="log")showLog=!showLog;
 else if(a==="rules")showRules=!showRules;
 else if(a==="stats")showStats=!showStats;
 else if(a==="review")showReview=!showReview;
 else if(a==="reset"){if(confirm("Wirklich allen Fortschritt löschen?")){done={};store.set(done)}}
 render();
});

render();
if("serviceWorker" in navigator&&(location.protocol==="https:"||location.hostname==="localhost")){
 navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
</body>
</html>
