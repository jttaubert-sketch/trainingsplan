<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Training — Jan</title>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#20261F">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#14181A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ————————————————————————————————————————————
   Design-System v8 — Roadbook
   Shape-Lock: Karten 12px · interaktive Flächen 8px · Tags = Pill (dokumentierte Regel)
   Ein Akzent: Streckenmarkierungs-Orange. Zonenfarben sind Datenfarben, kein Dekor.
   ———————————————————————————————————————————— */
:root{
  --bg:#E6E4DA; --panel:#FBFAF5; --panel2:#EFEDE3;
  --ink:#1C231C; --ink-soft:#586259; --ink-faint:#8A9189; --line:#DAD7CB;
  --accent:#C8491D; --accent-ink:#FFFFFF; --accent-soft:#F4E2D8;
  --z2:#3E6F8E; --lang:#2E5746; --kraft:#8A7141; --intens:#C2401C;
  --ruhe:#A8ADA6; --dienst:#7A3E8F;
  --done:#2E5746;
  --bonus:#1F8A8A;
  --shadow-md:0 4px 16px -4px rgba(28,35,28,.10), 0 2px 6px -2px rgba(28,35,28,.06);
  --shadow-card:0 1px 3px rgba(46,87,70,.05), 0 6px 24px -8px rgba(28,35,28,.08);
  --cond:'Barlow Condensed',-apple-system,system-ui,sans-serif;
  --body:'Barlow',-apple-system,system-ui,sans-serif;
  --r-card:14px; --r-int:9px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0F1413; --panel:#19201D; --panel2:#212824;
    --ink:#EAE8DE; --ink-soft:#97A097; --ink-faint:#646E66; --line:#2C342F;
    --accent:#F0703A; --accent-ink:#160E08; --accent-soft:#2A1C13;
    --z2:#6FA3C4; --lang:#5E9C82; --kraft:#C0A36E; --intens:#F0703A;
    --ruhe:#5C645D; --dienst:#B07CC4;
    --done:#5E9C82; --bonus:#4FC4C4;
    --shadow-md:0 4px 18px -4px rgba(0,0,0,.45), 0 2px 6px -2px rgba(0,0,0,.3);
    --shadow-card:0 2px 8px rgba(0,0,0,.28), 0 8px 28px -10px rgba(0,0,0,.4);
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{color-scheme:light dark}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.45}
button{font-family:inherit;cursor:pointer;color:inherit}
button:active{transform:scale(.98)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
.num{font-variant-numeric:tabular-nums}

/* ——— Kopf ——— */
header{background:linear-gradient(165deg,#243024 0%,#1A211B 60%,#171E18 100%);color:#EFEDE3;padding:calc(env(safe-area-inset-top) + 22px) 18px 20px;position:relative}
  header::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent 60%)}
@media (prefers-color-scheme: dark){header{background:linear-gradient(165deg,#1A211D 0%,#101614 70%,#0D1211 100%)}}
.wrap{max-width:920px;margin:0 auto;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
.eyebrow{font-family:var(--cond);font-weight:600;letter-spacing:.24em;font-size:11px;color:var(--accent);text-transform:uppercase;display:inline-flex;align-items:center;gap:7px}
  .eyebrow::before{content:"";width:18px;height:2px;background:var(--accent);border-radius:2px}
h1{font-family:var(--cond);font-weight:700;font-size:clamp(34px,9vw,46px);margin:5px 0 0;line-height:.92;text-transform:uppercase;letter-spacing:.005em;text-wrap:balance}
.head-top{display:flex;justify-content:space-between;align-items:flex-end;gap:14px}
.pct{font-family:var(--cond);font-weight:700;font-size:clamp(32px,8vw,42px);line-height:.85;text-align:right;color:#fff}
.pct small{font-size:.5em;font-weight:600}
.pct-sub{font-size:11px;color:#A9B0A4;margin-top:3px;white-space:nowrap}
.bar{margin-top:14px;height:6px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden}
.bar>div{height:100%;background:var(--accent)}
.stats{display:flex;gap:8px 16px;margin-top:12px;flex-wrap:wrap;font-size:12px;color:#B9BFB2}
.stats strong{color:#EFEDE3;font-weight:600}

/* Wochenvolumen */
.vol{display:flex;gap:5px;align-items:flex-end;margin-top:16px;height:62px}
.vol .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
.vol .stack{width:100%;height:42px;display:flex;align-items:flex-end}
.vol .b{width:100%;border-radius:5px 5px 2px 2px;position:relative;overflow:hidden;background:rgba(255,255,255,.13);transition:height .5s cubic-bezier(.16,1,.3,1)}
.vol .b.vol-big{background:var(--accent);box-shadow:0 0 12px -2px var(--accent)}
.vol .fill{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.5)}
.vol .lbl{font-family:var(--cond);font-weight:600;font-size:10px;color:#A9B0A4;white-space:nowrap}

/* ——— Inhalt ——— */
main{max-width:920px;margin:0 auto;padding:14px 14px calc(env(safe-area-inset-bottom) + 44px)}
.legend{display:flex;gap:6px 12px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--ink-soft);padding:2px 2px 12px}
.legend .leg-title{font-weight:600;color:var(--ink);margin-right:2px}
  .legend .leg-item{display:inline-flex;align-items:center;white-space:nowrap;gap:6px;padding:4px 9px;background:var(--panel);border:1px solid var(--line);border-radius:999px}
  .legend .leg-item .sw{width:11px;height:11px;min-width:11px;border-radius:3px;display:block;flex:0 0 11px;margin:0}
.legend button{margin-left:auto;font-size:12px;font-weight:600;background:var(--panel);border:1px solid var(--line);border-radius:var(--r-int);padding:8px 12px;min-height:36px}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-card);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-card)}
.card.current{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent), var(--shadow-card)}
.card.dashed{border-style:dashed;background:transparent;box-shadow:none}

/* Wochenkopf + Tagesband (Signature) */
.whead{width:100%;display:block;padding:12px 14px 11px;background:transparent;border:none;text-align:left}
.wrow{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.wid{font-family:var(--cond);font-weight:700;font-size:21px;color:var(--accent);letter-spacing:.02em}
.wrange{font-family:var(--cond);font-weight:600;font-size:17px;letter-spacing:.02em}
.pill{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:999px;background:var(--panel2);color:var(--ink-soft);border:1px solid var(--line)}
.pill.volumen{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.badge-now{font-family:var(--cond);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent)}
.wmeta{font-size:12px;color:var(--ink-soft);margin-left:auto;white-space:nowrap}
.dayband{display:flex;gap:3px;margin-top:9px;height:7px}
  .wk-bar{display:flex;align-items:center;gap:8px;margin-top:8px}
  .wk-bar-track{flex:1;height:6px;background:var(--panel2);border-radius:99px;display:flex;overflow:hidden;border:1px solid var(--line)}
  .wk-bar-soll{height:6px;background:var(--done);border-radius:99px;transition:width .5s cubic-bezier(.16,1,.3,1)}
  .wk-bar-extra{height:6px;background:var(--accent)}
  .wk-bar-lbl{font-size:10.5px;color:var(--ink-soft);white-space:nowrap;flex-shrink:0}
.dayband span{flex:1;border-radius:2px;background:var(--seg);opacity:.32}
.dayband span.don{opacity:1}
.dayband span.rst{opacity:.15}
.wnote{font-size:11.5px;color:var(--ink-soft);margin-top:7px}

/* Tage */
.days{border-top:1px solid var(--line)}
.day{display:flex;align-items:center;gap:11px;padding:11px 14px;border-top:1px solid var(--line);min-height:48px;transition:background .15s ease}
  .day:hover{background:var(--panel2)}
.day:first-child{border-top:none}
.day.rest{opacity:.6}
.stripe{width:4px;align-self:stretch;border-radius:99px;flex-shrink:0}
.dd{font-family:var(--cond);font-weight:600;font-size:15px;min-width:50px;flex-shrink:0}
.dtxt{flex:1;min-width:0}
.dtitle{font-weight:600;font-size:13.5px}
.dtitle.done{font-weight:400;text-decoration:line-through;color:var(--ink-soft)}
.dsub.ist{color:var(--done);font-weight:600}
  .dsub{font-size:11.5px;color:var(--ink-soft);display:block;margin-top:1px}
.shift{font-family:var(--cond);font-size:11px;font-weight:600;letter-spacing:.04em;color:#fff;background:var(--dienst);padding:3px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0}
@media (prefers-color-scheme: dark){.shift{color:#16100C}}
.chk{width:30px;height:30px;border-radius:var(--r-int);border:2px solid var(--line);background:transparent;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;color:transparent}
.chk.on{border-color:var(--done);background:var(--done);color:#fff;box-shadow:0 2px 6px -2px var(--done)}
@media (prefers-color-scheme: dark){.chk.on{color:#14181A}}

/* Detail + Notizen */
.detail{padding:11px 16px 14px 78px;font-size:12.5px;line-height:1.58;color:var(--ink-soft);background:var(--panel2);border-top:1px solid var(--line);box-shadow:inset 3px 0 0 var(--accent-soft)}
.notewrap{margin-top:11px;padding-top:10px;border-top:1px dashed var(--line)}
.rpelbl{font-family:var(--cond);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:6px}
.rperow{display:flex;gap:4px;flex-wrap:wrap}
.rpe{width:32px;height:32px;border-radius:var(--r-int);border:1px solid var(--line);background:var(--panel);font-size:12.5px;font-weight:600;padding:0}
.rpe.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);box-shadow:0 2px 6px -2px var(--accent)}
.noterow{display:flex;gap:6px;margin-top:9px}
.noterow input{flex:1;min-width:0;font-family:var(--body);font-size:13px;padding:9px 11px;border:1px solid var(--line);border-radius:var(--r-int);background:var(--panel);color:var(--ink)}
.noterow input::placeholder{color:var(--ink-soft)}
.noterow button{font-size:12px;font-weight:600;padding:9px 14px;border:none;border-radius:var(--r-int);background:var(--accent);color:var(--accent-ink)}

/* Sektionen unten */
.sechead{width:100%;display:flex;align-items:center;gap:10px;padding:13px 14px;background:transparent;border:none;text-align:left;min-height:46px;transition:background .15s ease}
  .sechead:hover{background:var(--panel2)}
.sechead .t{font-family:var(--cond);font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft)}
.sechead .s{font-size:11px;color:var(--ink-soft);flex:1}
.row{display:flex;gap:10px;padding:10px 14px;border-top:1px solid var(--line);font-size:12.5px;line-height:1.5}
.row .k{font-family:var(--cond);font-weight:600;font-size:12.5px;min-width:74px;flex-shrink:0;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
.row .k.dienste{color:var(--dienst)}.row .k.training{color:var(--z2)}.row .k.material{color:var(--accent)}
.zones{display:grid;grid-template-columns:1fr auto auto;gap:5px 16px;font-size:12.5px;padding:11px 14px;border-top:1px solid var(--line)}
.zones .h{font-family:var(--cond);font-weight:600;color:var(--ink-soft);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.chev{font-size:10px;color:var(--ink-soft);width:12px;text-align:center;flex-shrink:0}
.glabel{font-family:var(--cond);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink);margin-bottom:6px}
  .glegend{display:flex;gap:6px 14px;flex-wrap:wrap;font-size:11px;color:var(--ink-soft);margin-bottom:8px}
  .gdot{display:inline-block;width:9px;height:9px;border-radius:99px;margin-right:5px;vertical-align:-1px}
  .gnote{margin-left:auto;font-style:italic}
  .gcap{font-size:11px;color:var(--ink-soft);line-height:1.5;margin-top:7px}
  .wk-review{padding:13px 16px;background:linear-gradient(180deg,var(--accent-soft),var(--panel2) 70%);border-top:2px solid var(--accent)}
  .wk-review-head{font-family:var(--cond);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:7px}
  .wk-review-kpis{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .wk-review-kpis span{font-size:11px;color:var(--ink-soft);background:var(--panel);padding:3px 8px;border-radius:999px;white-space:nowrap}
  .wk-review-txt{font-size:12px;line-height:1.5;color:var(--ink);margin-top:4px}
  .wk-review-txt strong{color:var(--ink-soft);font-weight:600}
  .review{padding:11px 14px;border-top:1px solid var(--line)}
  .rev-head{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:7px}
  .rev-wk{font-family:var(--cond);font-weight:700;font-size:17px;color:var(--accent)}
  .rev-kpi{font-size:11px;color:var(--ink-soft);background:var(--panel);padding:4px 9px;border-radius:999px;white-space:nowrap;border:1px solid var(--line)}
  .rev-txt{font-size:12.5px;line-height:1.55;color:var(--ink);margin-top:4px}
  .rev-txt strong{color:var(--ink-soft);font-weight:600}
  .foot{font-size:11.5px;color:var(--ink-soft);line-height:1.6;margin-top:16px}
  /* ——— Tab-Navigation ——— */
  .tabs{display:flex;gap:4px;margin-top:16px;background:rgba(255,255,255,.07);padding:4px;border-radius:12px}
  .tab{flex:1;font-family:var(--cond);font-weight:600;font-size:14px;letter-spacing:.03em;text-transform:uppercase;color:#A9B0A4;background:transparent;border:none;padding:9px 8px;border-radius:9px;cursor:pointer;transition:all .18s ease;min-height:40px}
  .tab.on{background:var(--accent);color:var(--accent-ink);box-shadow:0 2px 8px -2px var(--accent)}
  .tab:not(.on):active{transform:scale(.97)}
  /* ——— Overview ——— */
  .hero-card{padding:16px}
  .oh-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .oh-eyebrow{font-family:var(--cond);font-weight:600;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}
  .oh-wid{font-family:var(--cond);font-weight:600;font-size:15px;color:var(--ink)}
  .oh-big{font-family:var(--cond);font-weight:700;font-size:34px;line-height:1;color:var(--ink);margin-bottom:10px}
  .oh-unit{font-size:16px;color:var(--ink-soft);font-weight:600}
  .oh-pct{font-size:18px;color:var(--ink-soft);font-weight:700;margin-left:4px}
  .oh-pct.over{color:var(--accent)}
  .oh-sub{font-size:12.5px;color:var(--ink-soft);margin-top:9px}
  .oh-next{margin-top:13px;padding-top:13px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:5px}
  .oh-next-lbl{font-family:var(--cond);font-weight:600;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}
  .oh-next-day{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;color:var(--ink)}
  .oh-next-day .stripe{width:4px;height:18px;border-radius:99px}
  .oh-link{margin-top:14px;width:100%;font-family:var(--cond);font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);border:none;border-radius:var(--r-int);padding:11px;cursor:pointer;min-height:42px;transition:transform .12s}
  .oh-link:active{transform:scale(.98)}
  .oc-head{font-family:var(--cond);font-weight:700;font-size:16px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);padding:14px 14px 4px}
  .todo-list{padding:6px 14px 8px}
  .todo{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line)}
  .todo:first-child{border-top:none}
  .todo-dot{width:8px;height:8px;border-radius:99px;flex:0 0 8px}
  .todo-txt{flex:1;font-size:13px;line-height:1.4;color:var(--ink)}
  .todo-txt.done{color:var(--ink-faint);text-decoration:line-through}
  .todo-when{font-size:11px;color:var(--ink-soft);white-space:nowrap;font-variant-numeric:tabular-nums}
  .countdown{padding:16px;background:linear-gradient(135deg,#243024,#1A211B);color:#EFEDE3}
  /* ——— Readiness ——— */
  .readiness{padding:14px}
  .rd-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .rd-reset{font-size:11px;color:var(--ink-soft);background:transparent;border:none;text-decoration:underline;cursor:pointer;padding:2px 4px}
  .rd-btns{display:flex;gap:8px}
  .rd-btn{flex:1;font-family:var(--cond);font-weight:600;font-size:15px;letter-spacing:.02em;padding:12px 6px;border-radius:var(--r-int);border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer;min-height:48px;transition:all .15s ease}
  .rd-btn.on.fit{background:var(--done);border-color:var(--done);color:#fff;box-shadow:0 2px 8px -2px var(--done)}
  .rd-btn.on.okay{background:var(--kraft);border-color:var(--kraft);color:#fff;box-shadow:0 2px 8px -2px var(--kraft)}
  .rd-btn.on.platt{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);box-shadow:0 2px 8px -2px var(--accent)}
  .rec-banner{margin-top:12px;padding:11px 13px;border-radius:var(--r-int);font-size:12.5px;line-height:1.5}
  .rec-banner.fit{background:rgba(46,87,70,.08);color:var(--ink);border-left:3px solid var(--done)}
  .rec-banner.okay{background:rgba(138,113,65,.10);color:var(--ink);border-left:3px solid var(--kraft)}
  .rec-banner.platt{background:var(--accent-soft);color:var(--ink);border-left:3px solid var(--accent)}
  .rec-banner strong{font-weight:700}
  .rd-note{margin-top:8px;font-size:11.5px;color:var(--ink-soft);font-style:italic}
  /* ——— RPE-Abgleich ——— */
  .rpe-exp{font-weight:500;color:var(--ink-faint);text-transform:none;letter-spacing:0}
  .rpe.exp{border-color:var(--done);border-width:1.5px}
  .rpe-flag{margin-top:9px;padding:9px 11px;border-radius:var(--r-int);font-size:12px;line-height:1.5}
  .rpe-flag.hoch{background:var(--accent-soft);color:var(--ink);border-left:3px solid var(--accent)}
  .rpe-flag.leicht{background:rgba(138,113,65,.10);color:var(--ink);border-left:3px solid var(--kraft)}
  .cd-row{display:flex;justify-content:space-between;align-items:center}
  .cd-big{font-family:var(--cond);font-weight:700;font-size:52px;line-height:.9;color:var(--accent)}
  .cd-lbl{font-family:var(--cond);font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:#A9B0A4;margin-top:2px}
  .cd-side{text-align:right;font-size:15px;font-weight:700;color:#EFEDE3;line-height:1.4}
  .cd-side span{font-size:11px;color:#A9B0A4;font-weight:500}
  /* ——— Setup ——— */
  .setup-list{padding:4px 0 8px}
  .srow{display:flex;gap:12px;padding:9px 14px;border-top:1px solid var(--line)}
  .srow:first-child{border-top:none}
  .srow-k{font-family:var(--cond);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);flex:0 0 110px}
  .srow-v{font-size:13px;color:var(--ink);line-height:1.4}
  /* ——— Drag&Drop ——— */
  .drag-handle{cursor:grab;color:var(--ink-faint);font-size:15px;line-height:1;padding:0 2px;flex-shrink:0;touch-action:none;user-select:none}
  .drag-handle:active{cursor:grabbing}
  .day{position:relative}
  .day.dragging{opacity:.45;background:var(--panel2)}
  .day.drop-above::before,.day.drop-below::after{content:"";position:absolute;left:8px;right:8px;height:2px;background:var(--accent);border-radius:2px}
  .day.drop-above::before{top:-1px}
  .day.drop-below::after{bottom:-1px}

function orderedDays(w){
 const order=dayOrder[w.id];
 const base=w.days.map((d,i)=>({d,oi:i}));
 if(!order||order.length!==base.length) return base;
 const seen=new Set(), out=[];
 order.forEach(oi=>{if(oi>=0&&oi<base.length&&!seen.has(oi)){out.push(base[oi]);seen.add(oi)}});
 base.forEach((b,i)=>{if(!seen.has(i))out.push(b)});
 return out;
}


// ————— Graph-Helfer (reine SVG, responsiv via viewBox) —————
function lineGraph(series, opts){
 // series: [{pts:[{x,y}], color, label}], opts:{w,h,ymin,ymax,xlabels,yunit,ylabels}
 const W=opts.w||320,H=opts.h||150,pl=34,pr=10,pt=12,pb=24;
 const iw=W-pl-pr, ih=H-pt-pb;
 const ymin=opts.ymin,ymax=opts.ymax,n=opts.xlabels.length;
 const xAt=i=>pl+(n<=1?iw/2:iw*i/(n-1));
 const yAt=v=>pt+ih-(ih*(v-ymin)/(ymax-ymin||1));
 let g=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img">`;
 // horizontale Gitterlinien + y-Beschriftung
 (opts.ylabels||[ymin,(ymin+ymax)/2,ymax]).forEach(v=>{
  const y=yAt(v);
  g+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="var(--line)" stroke-width="1"/>`;
  g+=`<text x="${pl-5}" y="${y+3}" text-anchor="end" font-size="9" fill="var(--ink-soft)">${Math.round(v)}</text>`;
 });
 // x-Beschriftung
 opts.xlabels.forEach((lb,i)=>{g+=`<text x="${xAt(i)}" y="${H-7}" text-anchor="middle" font-size="9" fill="var(--ink-soft)">${lb}</text>`});
 // Serien
 series.forEach(s=>{
  if(!s.pts.length)return;
  const d=s.pts.map((p,i)=>`${i?"L":"M"}${xAt(p.x).toFixed(1)},${yAt(p.y).toFixed(1)}`).join(" ");
  g+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  s.pts.forEach(p=>{g+=`<circle cx="${xAt(p.x).toFixed(1)}" cy="${yAt(p.y).toFixed(1)}" r="3.5" fill="${s.color}"/>`});
 });
 g+=`</svg>`;
 return g;
}
function barGraph(bars, opts){
 // bars:[{label,val,done,big}], opts:{w,h,ymax,yunit}
 const W=opts.w||320,H=opts.h||150,pl=30,pr=8,pt=10,pb=22;
 const iw=W-pl-pr, ih=H-pt-pb, n=bars.length, gap=5;
 const bw=(iw-gap*(n-1))/n, ymax=opts.ymax;
 const yAt=v=>pt+ih-(ih*v/(ymax||1));
 let g=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img">`;
 [0,ymax/2,ymax].forEach(v=>{const y=yAt(v);g+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="var(--line)" stroke-width="1"/><text x="${pl-5}" y="${y+3}" text-anchor="end" font-size="9" fill="var(--ink-soft)">${Math.round(v)}</text>`});
 bars.forEach((b,i)=>{
  const x=pl+i*(bw+gap), y=yAt(b.val), bh=pt+ih-y;
  g+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,bh).toFixed(1)}" rx="2" fill="${b.big?"var(--accent)":"var(--z2)"}" opacity="${b.done?1:0.4}"/>`;
  g+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-7}" text-anchor="middle" font-size="9" fill="var(--ink-soft)">${b.label}</text>`;
 });
 g+=`</svg>`;
 return g;
}

 // 3) FTP / Fortschrittskurve

 });
 html+=`<div class="card dashed"><button class="sechead" data-a="rules" aria-expanded="${showRules}"><span class="t">Regeln</span><span class="s">Dienstplan, Training, Material &amp; Bedienung</span><span class="chev">${showRules?"▲":"▼"}</span></button>`;

 html+=`<div class="card"><div class="oc-head">Fitness · Ermüdung · Form</div><div style="padding:0 14px 14px">

 html+=`</div>`;
 return html;
}

document.getElementById("app").addEventListener("click",e=>{
 if(e.target.tagName==="INPUT")return;
 const el=e.target.closest("[data-a]"); if(!el)return;
 const a=el.dataset.a;
 if(a==="rpe"){const k=el.dataset.k,r=parseInt(el.dataset.r);notes[k]=notes[k]||{};notes[k].rpe=notes[k].rpe===r?undefined:r;nstore.set(notes)}
 else if(a==="savenote"){const k=el.dataset.k;const inp=document.getElementById("note-"+k);notes[k]=notes[k]||{};notes[k].n=(inp&&inp.value.trim())||undefined;if(!notes[k].n&&!notes[k].rpe)delete notes[k];nstore.set(notes)}
 else if(a==="chk"){e.stopPropagation();const k=el.dataset.k;done[k]=!done[k];store.set(done)}
 else if(a==="week"){const w=el.dataset.w;openWeeks[w]=!openWeeks[w]}
 else if(a==="day"){if(e.target.closest(".notewrap"))return;const k=el.dataset.k;openDay=openDay===k?null:k}
 else if(a==="zones")showZones=!showZones;
 else if(a==="log")showLog=!showLog;
 else if(a==="rules")showRules=!showRules;
 else if(a==="stats")showStats=!showStats;
 else if(a==="review")showReview=!showReview;
 else if(a==="nav"){route=el.dataset.r;openDay=null;window.scrollTo(0,0)}
 else if(a==="readiness"){const v=el.dataset.v;if(v){readiness[today]=v}else{delete readiness[today]}rstore.set(readiness)}
 else if(a==="reset"){if(confirm("Wirklich allen Fortschritt löschen?")){done={};store.set(done)}}
 render();
});

// ——— Drag&Drop: Einheiten innerhalb der Woche verschieben (Tag-Zuordnung ändern) ———
let dragKey=null, dragWeek=null;
const app=document.getElementById("app");
app.addEventListener("dragstart",e=>{
 const day=e.target.closest(".day"); if(!day)return;
 dragKey=day.dataset.k; dragWeek=day.dataset.w;
 day.classList.add("dragging");
 try{e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",dragKey)}catch(_){}
});
app.addEventListener("dragend",e=>{
 const day=e.target.closest(".day"); if(day)day.classList.remove("dragging");
 app.querySelectorAll(".day.drop-above,.day.drop-below").forEach(d=>d.classList.remove("drop-above","drop-below"));
});
app.addEventListener("dragover",e=>{
 const day=e.target.closest(".day"); if(!day||!dragWeek)return;
 if(day.dataset.w!==dragWeek)return; // nur innerhalb derselben Woche
 e.preventDefault();
 const r=day.getBoundingClientRect();
 const below=e.clientY > r.top+r.height/2;
 app.querySelectorAll(".day.drop-above,.day.drop-below").forEach(d=>d.classList.remove("drop-above","drop-below"));
 day.classList.add(below?"drop-below":"drop-above");
});
app.addEventListener("drop",e=>{
 const day=e.target.closest(".day"); if(!day||!dragWeek)return;
 if(day.dataset.w!==dragWeek){dragKey=dragWeek=null;return}
 e.preventDefault();
 const w=WEEKS.find(x=>x.id===dragWeek); if(!w){dragKey=dragWeek=null;return}
 // aktuelle Anzeige-Reihenfolge (Original-Indizes)
 let order=orderedDays(w).map(o=>o.oi);
 const fromOi=parseInt(dragKey.split("-")[1]);
 const toOi=parseInt(day.dataset.oi);
 const r=day.getBoundingClientRect();
 const below=e.clientY > r.top+r.height/2;
 order=order.filter(x=>x!==fromOi);
 let idx=order.indexOf(toOi); if(below)idx++;
 order.splice(idx,0,fromOi);
 dayOrder[w.id]=order; ostore.set(dayOrder);
 dragKey=dragWeek=null;
 render();
});

render();
if("serviceWorker" in navigator&&(location.protocol==="https:"||location.hostname==="localhost")){
 navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
</body>
</html>
