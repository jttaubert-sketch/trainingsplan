<style>
  :root{
    --bg:#E7E5DD; --panel:#FBFAF6; --ink:#212A25; --ink-soft:#5C665F;
    --line:#D3D0C5; --accent:#D14B1F;
    --z2:#3E6F8E; --lang:#2E5746; --kraft:#8A7141; --intens:#C2401C;
    --ruhe:#9AA09A; --dienst:#7A3E8F;
    --cond:'Barlow Condensed',-apple-system,system-ui,sans-serif;
    --body:'Barlow',-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  header{background:var(--ink);color:#EFEDE5;padding:calc(env(safe-area-inset-top) + 18px) 16px 18px}
  .wrap{max-width:920px;margin:0 auto;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
  .eyebrow{font-family:var(--cond);font-weight:600;letter-spacing:.18em;font-size:11px;color:var(--accent);text-transform:uppercase}
  h1{font-family:var(--cond);font-weight:700;font-size:32px;margin:4px 0 0;line-height:1;text-transform:uppercase}
  .head-top{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap}
  .pct{font-family:var(--cond);font-weight:700;font-size:34px;line-height:1;text-align:right}
  .pct small{font-size:17px}
  .pct-sub{font-size:11px;color:#A9B0A8}
  .bar{margin-top:12px;height:6px;background:#3A453F;border-radius:3px;overflow:hidden}
  .bar > div{height:100%;background:var(--accent);transition:width .4s ease}
  .stats{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;font-size:12px;color:#C7CCC4}
  .stats strong{color:#EFEDE5}
  .vol{display:flex;gap:5px;align-items:flex-end;margin-top:16px;height:54px}
  .vol .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
  .vol .stack{width:100%;height:38px;display:flex;align-items:flex-end}
  .vol .b{width:100%;border-radius:3px 3px 0 0;position:relative;overflow:hidden}
  .vol .fill{position:absolute;bottom:0;left:0;right:0;background:rgba(239,237,229,.45)}
  .vol .lbl{font-size:9px;color:#A9B0A8;font-family:var(--cond);white-space:nowrap}
  main{max-width:920px;margin:0 auto;padding:12px 14px calc(env(safe-area-inset-bottom) + 40px)}
  .legend{display:flex;gap:11px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--ink-soft);padding:2px 2px 10px}
  .legend .sw{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:-1px}
  .legend button{margin-left:auto;font-size:11px;font-weight:600;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:5px 9px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden}
  .card.current{border-color:var(--accent)}
  .card.dashed{border-style:dashed}
  .whead{width:100%;display:flex;align-items:center;gap:8px;padding:11px 12px;background:transparent;border:none;text-align:left;flex-wrap:wrap}
  .wid{font-family:var(--cond);font-weight:700;font-size:19px;min-width:34px}
  .wrange{font-family:var(--cond);font-weight:600;font-size:16px}
  .pill{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:999px;background:#E8ECEF;color:var(--ink-soft)}
  .pill.entlastung{background:#E4E9E2}.pill.volumen{background:#F6E3D8;color:var(--accent)}
  .badge-now{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#fff;background:var(--accent);padding:2px 6px;border-radius:4px}
  .wnote{font-size:11px;color:var(--ink-soft);flex:1 1 100%;order:9;padding-left:42px}
  .wmeta{font-size:11px;color:var(--ink-soft);white-space:nowrap;margin-left:auto}
  .chev{font-size:10px;color:var(--ink-soft);width:12px;text-align:center}
  .days{border-top:1px solid var(--line)}
  .day{display:flex;align-items:center;gap:9px;padding:9px 12px;border-top:1px solid rgba(211,208,197,.35)}
  .day:first-child{border-top:none}
  .day.rest{opacity:.65}
  .stripe{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0}
  .dd{font-family:var(--cond);font-weight:600;font-size:15px;min-width:48px;flex-shrink:0}
  .dtxt{flex:1;min-width:0}
  .dtitle{font-weight:600;font-size:13px}
  .dtitle.done{font-weight:400;text-decoration:line-through;color:var(--ink-soft)}
  .dsub{font-size:11px;color:var(--ink-soft);display:block}
  .shift{font-size:9.5px;font-weight:600;color:#fff;background:var(--dienst);padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
  .chk{width:26px;height:26px;border-radius:7px;border:2px solid var(--line);background:transparent;color:#fff;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
  .chk.on{border-color:var(--lang);background:var(--lang)}
  .detail{padding:8px 12px 11px 73px;font-size:12px;line-height:1.55;color:var(--ink-soft);background:#F5F3EC;border-top:1px dashed var(--line)}
  .sechead{width:100%;display:flex;align-items:center;gap:8px;padding:11px 12px;background:transparent;border:none;text-align:left}
  .sechead .t{font-family:var(--cond);font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft)}
  .sechead .s{font-size:10px;color:var(--ink-soft);flex:1}
  .row{display:flex;gap:10px;padding:9px 12px;border-top:1px solid rgba(211,208,197,.35);font-size:12px;line-height:1.5}
  .row:first-child{border-top:none}
  .row .k{font-family:var(--cond);font-weight:600;font-size:12px;min-width:70px;flex-shrink:0;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
  .row .k.dienste{color:var(--dienst)}.row .k.training{color:var(--z2)}
  .zones{display:grid;grid-template-columns:1fr auto auto;gap:4px 14px;font-size:12px;padding:10px 12px;border-top:1px solid var(--line)}
  .zones .h{font-weight:600;color:var(--ink-soft);font-size:10px;text-transform:uppercase}
  .foot{font-size:11.5px;color:var(--ink-soft);line-height:1.6;margin-top:14px}
  .reset{margin-top:16px;font-size:11px;color:var(--ink-soft);background:transparent;border:1px solid var(--line);border-radius:6px;padding:6px 11px}
  @media(min-width:640px){.wnote{flex:1;order:0;padding-left:0}h1{font-size:40px}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");

function render(){
 const s=stats(), pct=s.t?Math.round(s.dc/s.t*100):0;
 const wTraka=Math.max(0,Math.round((new Date("2027-05-01")-new Date())/(7*864e5)));
 const maxH=Math.max(...WEEKS.map(w=>w.days.reduce((a,d)=>a+d.h,0)));
 let html=`<header><div class="wrap">
  <div class="head-top"><div>
   <div class="eyebrow">Phase 1 · Basis · noch ~${wTraka} Wochen bis The Traka</div>
   <h1>Mikroplan 12.06 – 02.08</h1></div>
   <div><div class="pct">${pct}<small>%</small></div>
   <div class="pct-sub">${s.dc}/${s.t} Einheiten · ${s.hd.toFixed(1)} / ~${s.hp.toFixed(0)} h</div></div></div>
  <div class="bar"><div style="width:${pct}%"></div></div>
  <div class="stats"><span><strong>FTP:</strong> 226 W (Retest 23.06.)</span><span><strong>Gewicht:</strong> 89 kg → 2,5 W/kg</span></div>
  <div class="vol">`;
 WEEKS.forEach(w=>{
  const h=w.days.reduce((a,d)=>a+d.h,0);
  const hd=w.days.reduce((a,d,i)=>a+(d.type!=="ruhe"&&done[w.id+"-"+i]?d.h:0),0);
  const c=w.tag==="Entlastung"?"#5A6B62":w.tag==="Volumen"?"var(--accent)":"#7A98AB";
  html+=`<div class="col"><div class="stack"><div class="b" style="height:${h/maxH*100}%;background:${c}"><div class="fill" style="height:${h?hd/h*100:0}%"></div></div></div><span class="lbl">${w.id} · ${fmtH(h)}h</span></div>`;
 });
 html+=`</div></div></header><main><div class="legend">`;
 Object.values(TYPE).forEach(m=>{html+=`<span><span class="sw" style="background:${m.c}"></span>${m.label}</span>`});
 html+=`<span><span class="sw" style="background:var(--dienst)"></span>Dienst</span><button data-a="zones">${showZones?"Zonen ausblenden":"Zonen anzeigen"}</button></div>`;
 if(showZones){
  html+=`<div class="card"><div class="zones"><span class="h">Zone</span><span class="h">Watt</span><span class="h">Puls</span>`;
  ZONES.forEach(z=>{html+=`<span>${z[0]}</span><span>${z[1]}</span><span>${z[2]}</span>`});
  html+=`</div></div>`;
 }
 WEEKS.forEach(w=>{
  const wd=w.days.filter(d=>d.type!=="ruhe");
  const dc=w.days.reduce((a,d,i)=>a+(d.type!=="ruhe"&&done[w.id+"-"+i]?1:0),0);
  const h=w.days.reduce((a,d)=>a+d.h,0);
  const open=!!openWeeks[w.id];
  const [ws,we]=WEEK_DATES[w.id];
  const cur=today>=ws&&today<=we;
  html+=`<div class="card${cur?" current":""}"><button class="whead" data-a="week" data-w="${w.id}">
   <span class="wid">${w.id}</span><span class="wrange">${w.range}</span>
   <span class="pill ${w.tag.toLowerCase()}">${w.tag}</span>
   ${cur?'<span class="badge-now">Aktuell</span>':""}
   <span class="wmeta">${dc}/${wd.length} · ~${fmtH(h)} h</span><span class="chev">${open?"▲":"▼"}</span>
   <span class="wnote">${esc(w.note)}</span></button>`;
  if(open){
   html+=`<div class="days">`;
   w.days.forEach((d,i)=>{
    const key=w.id+"-"+i, rest=d.type==="ruhe", chk=!!done[key], dOpen=openDay===key;
    html+=`<div class="day${rest?" rest":""}" data-a="${d.detail?"day":""}" data-k="${key}">
     <span class="stripe" style="background:${TYPE[d.type].c}"></span>
     <span class="dd">${d.d}</span>
     <span class="dtxt"><span class="dtitle${chk?" done":""}">${esc(d.title)}</span>${d.sub?`<span class="dsub">${esc(d.sub)}${d.detail?" "+(dOpen?"▲":"▼"):""}</span>`:(d.detail?`<span class="dsub">${dOpen?"▲":"▼"}</span>`:"")}</span>
     ${d.shift?`<span class="shift">${d.shift}</span>`:""}
     ${rest?"":`<button class="chk${chk?" on":""}" data-a="chk" data-k="${key}" aria-label="abhaken">${chk?"✓":""}</button>`}</div>`;
    if(dOpen&&d.detail) html+=`<div class="detail">${esc(d.detail)}</div>`;
   });
   html+=`</div>`;
  }
  html+=`</div>`;
 });
 // Updates
 html+=`<div class="card dashed"><button class="sechead" data-a="log"><span class="t">Updates &amp; Änderungen</span><span class="s">${CHANGELOG.length} Einträge · zuletzt ${CHANGELOG[0].date}</span><span class="chev">${showLog?"▲":"▼"}</span></button>`;
 if(showLog){CHANGELOG.forEach(c=>{html+=`<div class="row"><span class="k">${c.date}</span><span>${esc(c.text)}</span></div>`})}
 html+=`</div>`;
 // Regeln
 html+=`<div class="card dashed"><button class="sechead" data-a="rules"><span class="t">Regeln</span><span class="s">Dienstplan, Training &amp; Bedienung</span><span class="chev">${showRules?"▲":"▼"}</span></button>`;
 if(showRules){RULES.forEach(r=>{html+=`<div class="row"><span class="k ${r.cat.toLowerCase()}">${r.cat}</span><span>${esc(r.text)}</span></div>`})}
 html+=`</div>`;
 html+=`<p class="foot">ⓘ Diese App läuft lokal auf deinem Gerät und offline. Plan-Updates: neue index.html von Claude generieren lassen und auf dein Hosting hochladen — Häkchen bleiben erhalten, da sie lokal gespeichert sind.</p>
 <button class="reset" data-a="reset">Fortschritt zurücksetzen</button></main>`;
 document.getElementById("app").innerHTML=html;
}

document.getElementById("app").addEventListener("click",e=>{
 const el=e.target.closest("[data-a]"); if(!el)return;
 const a=el.dataset.a;
 if(a==="chk"){e.stopPropagation();const k=el.dataset.k;done[k]=!done[k];store.set(done)}
 else if(a==="week"){const w=el.dataset.w;openWeeks[w]=!openWeeks[w]}
 else if(a==="day"){const k=el.dataset.k;openDay=openDay===k?null:k}
 else if(a==="zones")showZones=!showZones;
 else if(a==="log")showLog=!showLog;
 else if(a==="rules")showRules=!showRules;
 else if(a==="reset"){if(confirm("Wirklich allen Fortschritt löschen?")){done={};store.set(done)}}
 render();
});

render();
if("serviceWorker" in navigator&&(location.protocol==="https:"||location.hostname==="localhost")){
 navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
</body>
</html>
